<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay with Razorpay</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        .card{
            background:#fff;
            padding:40px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
            text-align:center;
            width:350px;
        }

        h1{
            margin-bottom:10px;
            color:#222;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Payment</h1>
    <p>Click the button below to pay securely.</p>

    <form>
        <script
            src="https://checkout.razorpay.com/v1/payment-button.js"
            data-payment_button_id="pl_TBNr5fK1R8ETUu"
            async>
        </script>
    </form>

</div>

</body>
</html>
